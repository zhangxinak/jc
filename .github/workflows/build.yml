name: 构建机器码获取工具

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: machine-code-tool-kylin
          - os: macos-latest
            target: universal-apple-darwin
            asset_name: machine-code-tool-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: machine-code-tool-windows
          - os: windows-latest
            target: i686-pc-windows-msvc
            asset_name: machine-code-tool-windows-32

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: 确定项目目录
        id: project-dir
        run: |
          if [ -d "machine-code-tool/src-tauri" ]; then
            echo "dir=machine-code-tool" >> $GITHUB_OUTPUT
          else
            echo "dir=." >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: 构建 Ubuntu 20.04 镜像（仅 Linux，麒麟版 AppImage）
        if: matrix.os == 'ubuntu-latest'
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.project-dir.outputs.dir }}
          file: ${{ steps.project-dir.outputs.dir }}/.github/docker/Dockerfile.kylin-apt
          push: false
          load: true
          tags: kylin-apt-builder:latest

      - name: Linux 在容器内构建 AppImage（glibc 2.31，麒麟 V10）
        if: matrix.os == 'ubuntu-latest'
        run: |
          PROJ="${{ steps.project-dir.outputs.dir }}"
          docker run --rm \
            -v "$(pwd)/$PROJ:/workspace" \
            -w /workspace \
            kylin-apt-builder:latest bash -c '
              set -e
              export LANG=en_US.UTF-8
              cd /workspace/src-tauri
              mkdir -p icons
              ICONS_ABS="$(pwd)/icons"
              SRC_ICON=""
              [ -f "$ICONS_ABS/icon.png" ] && SRC_ICON="$ICONS_ABS/icon.png"
              [ -z "$SRC_ICON" ] && [ -f "$ICONS_ABS/512x512.png" ] && SRC_ICON="$ICONS_ABS/512x512.png"
              for s in 32 128 256 512; do
                if [ -n "$SRC_ICON" ]; then
                  convert "$SRC_ICON" -resize ${s}x${s} -strip "PNG32:$ICONS_ABS/${s}x${s}.png"
                elif [ -f "$ICONS_ABS/${s}x${s}.png" ]; then
                  convert "$ICONS_ABS/${s}x${s}.png" -strip "PNG32:$ICONS_ABS/${s}x${s}.png"
                else
                  convert -size ${s}x${s} xc:none -fill "#4080ff" -draw "rectangle 0,0 $s,$s" -strip "PNG32:$ICONS_ABS/${s}x${s}.png"
                fi
              done
              mkdir -p ../dist
              [ ! -f ../dist/index.html ] && cp /workspace/.github/docker/kylin-fallback-index.html ../dist/index.html
              cp tauri.conf.json tauri.conf.json.bak
              sed -i "s/\"productName\":\"机器码获取工具\"/\"productName\":\"machine-code-tool\"/" tauri.conf.json
              cargo tauri build --verbose
              mv tauri.conf.json.bak tauri.conf.json 2>/dev/null || true
              APPIMG=$(find target/release/bundle/appimage -maxdepth 1 -name "*.AppImage" -type f 2>/dev/null | head -1)
              [ -z "$APPIMG" ] && echo "❌ 未找到 AppImage" && exit 1
              cp "$APPIMG" machine-code-tool-kylin-apt.AppImage
              chmod +x machine-code-tool-kylin-apt.AppImage
              echo "🐧 机器码获取工具 - 银河麒麟 / Linux（AppImage）" > 使用说明-麒麟-apt.txt
              echo "=======================================" >> 使用说明-麒麟-apt.txt
              echo "" >> 使用说明-麒麟-apt.txt
              echo "🎉 适用于麒麟 V10、Ubuntu 20.04 等，单文件免安装。" >> 使用说明-麒麟-apt.txt
              echo "" >> 使用说明-麒麟-apt.txt
              echo "💻 使用步骤：" >> 使用说明-麒麟-apt.txt
              echo "" >> 使用说明-麒麟-apt.txt
              echo "1、 先尝试直接双击「machine-code-tool-kylin.AppImage」运行。" >> 使用说明-麒麟-apt.txt
              echo "" >> 使用说明-麒麟-apt.txt
              echo "2、 若无法运行或提示没有执行权限：" >> 使用说明-麒麟-apt.txt
              echo "   右键点击该文件 → 选择「属性」→ 打开「权限」标签 → 勾选「允许作为程序执行」→ 关闭后双击运行。" >> 使用说明-麒麟-apt.txt
              echo "" >> 使用说明-麒麟-apt.txt
              echo "3、 若打开时出现 AT-SPI 相关提示，可忽略不影响使用。" >> 使用说明-麒麟-apt.txt
              echo "" >> 使用说明-麒麟-apt.txt
              echo "✨ 功能：获取机器硬件信息，提供投标API服务 | 📝 版本：2.1.0" >> 使用说明-麒麟-apt.txt
            '
          mkdir -p upload
          cp "$PROJ/src-tauri/machine-code-tool-kylin-apt.AppImage" upload/machine-code-tool-kylin.AppImage
          # 使用英文文件名 README.txt 避免解压后中文文件名乱码（如 浣跨颗璇存槑.txt）
          cp "$PROJ/src-tauri/使用说明-麒麟-apt.txt" upload/README.txt
          chmod +x upload/machine-code-tool-kylin.AppImage
          ls -la upload/

      - name: 安装Rust（macOS / Windows）
        if: matrix.os != 'ubuntu-latest'
        uses: dtolnay/rust-toolchain@master
        with:
          # 1.78+ 在 Win7 上会因 ProcessPrng 无法启动，须固定 1.77.2
          toolchain: 1.77.2
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: 缓存Cargo依赖
        if: matrix.os != 'ubuntu-latest'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ${{ steps.project-dir.outputs.dir }}/src-tauri/target/
          key: ${{ runner.os }}-cargo-1772-v4-crt-static-${{ hashFiles(format('{0}/src-tauri/Cargo.lock', steps.project-dir.outputs.dir), format('{0}/src-tauri/Cargo.toml', steps.project-dir.outputs.dir), format('{0}/src-tauri/.cargo/config.toml', steps.project-dir.outputs.dir)) }}

      - name: 安装 stable 工具链（仅用于生成/锁定 Cargo.lock）
        if: matrix.os != 'ubuntu-latest'
        run: rustup toolchain install stable --profile minimal
        shell: bash

      - name: 生成/校验 Cargo.lock（stable 解析 + 1.77.2 构建）
        if: matrix.os != 'ubuntu-latest'
        run: |
          set -euo pipefail
          PROJ="${{ steps.project-dir.outputs.dir }}"
          bash "$PROJ/scripts/pin-rust1772-deps.sh"
        shell: bash

      - name: 构建（macOS / Windows）
        if: matrix.os != 'ubuntu-latest'
        env:
          RUSTFLAGS: ${{ matrix.os == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
        run: |
          set -e
          PROJ="${{ steps.project-dir.outputs.dir }}"
          cd "$PROJ/src-tauri"
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            echo "🍎 macOS构建：创建通用二进制文件"
          
            echo "📦 构建 Apple Silicon (aarch64) 版本..."
            cargo build --locked --release --target aarch64-apple-darwin --verbose
            echo "📁 aarch64 构建产物:"
            ls -la target/aarch64-apple-darwin/release/ 2>/dev/null || true
          
            echo "📦 构建 Intel (x86_64) 版本..."
            cargo build --locked --release --target x86_64-apple-darwin --verbose
            echo "📁 x86_64 构建产物:"
            ls -la target/x86_64-apple-darwin/release/ 2>/dev/null || true
          
            # cargo build 产物名为 Cargo.toml [[bin]] 名；cargo tauri build 可能用 productName
            A64=""
            X64=""
            for name in machine-code-tool "机器码获取工具"; do
              if [ -f "target/aarch64-apple-darwin/release/$name" ]; then A64="target/aarch64-apple-darwin/release/$name"; fi
              if [ -f "target/x86_64-apple-darwin/release/$name" ]; then X64="target/x86_64-apple-darwin/release/$name"; fi
            done
            [ -z "$A64" ] && echo "❌ 缺少 aarch64 可执行文件" && exit 1
            [ -z "$X64" ] && echo "❌ 缺少 x86_64 可执行文件" && exit 1
          
            echo "🔧 创建通用二进制文件..."
            lipo -create "$A64" "$X64" -output machine-code-tool-universal
          
            echo "📁 验证文件位置："
            ls -la machine-code-tool-universal
          
            echo "🔍 验证通用二进制文件："
            lipo -info machine-code-tool-universal
            file machine-code-tool-universal
          
            echo "✅ macOS通用版本创建完成"
          else
            echo "🚀 Windows构建（Rust 1.77.2，静态链接 CRT，避免 VCRUNTIME140_1.dll）"
            echo "RUSTFLAGS=$RUSTFLAGS"
            cargo clean
            cargo build --locked --release --target ${{ matrix.target }} --verbose
          
            echo "📋 构建产物:"
            ls -la target/${{ matrix.target }}/release/*.exe 2>/dev/null | head -20
          
            EXE=""
            for name in machine-code-tool "机器码获取工具"; do
              if [ -f "target/${{ matrix.target }}/release/$name.exe" ]; then EXE="target/${{ matrix.target }}/release/$name.exe"; fi
            done
            if [ -n "$EXE" ] && command -v dumpbin >/dev/null 2>&1; then
              echo "=== dumpbin /dependents $EXE ==="
              dumpbin /dependents "$EXE" | tee /tmp/exe-deps.txt || true
              if grep -i "VCRUNTIME140" /tmp/exe-deps.txt; then
                echo "⚠️ exe 仍依赖 VCRUNTIME DLL，客户机可能需安装 VC++ 运行库"
              else
                echo "✅ exe 未直接依赖 VCRUNTIME140*.dll"
              fi
            fi
          fi
        shell: bash

      - name: 复制并重命名构建产物（Linux 已在容器步骤中写入 upload/）
        if: matrix.os != 'ubuntu-latest'
        run: |
          mkdir -p upload
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # macOS: 复制通用二进制文件
            if [ -f "src-tauri/machine-code-tool-universal" ]; then
              cp src-tauri/machine-code-tool-universal upload/${{ matrix.asset_name }}
              chmod +x upload/${{ matrix.asset_name }}
              echo "✅ macOS通用版本文件已准备完成"
            else
              echo "❌ 未找到macOS通用二进制文件"
              echo "检查可用文件："
              find . -name "machine-code-tool*" -type f 2>/dev/null || echo "未找到任何machine-code-tool文件"
              exit 1
            fi
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            # 附带 VC++ 运行库安装包（客户机缺 DLL 时可双击安装）
            if [ "${{ matrix.asset_name }}" = "machine-code-tool-windows-32" ]; then
              curl -fsSL -o upload/vc_redist.x86.exe "https://aka.ms/vs/17/release/vc_redist.x86.exe"
            else
              curl -fsSL -o upload/vc_redist.x64.exe "https://aka.ms/vs/17/release/vc_redist.x64.exe"
            fi
            # Windows: 复制 exe（可执行文件名来自 tauri.conf.json 的 productName：机器码获取工具.exe）
            WIN_BIN="机器码获取工具.exe"
            WIN_EXE=""
            if [ -f "src-tauri/target/${{ matrix.target }}/release/$WIN_BIN" ]; then
              WIN_EXE="src-tauri/target/${{ matrix.target }}/release/$WIN_BIN"
            elif [ -f "src-tauri/target/release/$WIN_BIN" ]; then
              WIN_EXE="src-tauri/target/release/$WIN_BIN"
            elif [ -f "src-tauri/target/${{ matrix.target }}/release/machine-code-tool.exe" ]; then
              WIN_EXE="src-tauri/target/${{ matrix.target }}/release/machine-code-tool.exe"
            elif [ -f "src-tauri/target/release/machine-code-tool.exe" ]; then
              WIN_EXE="src-tauri/target/release/machine-code-tool.exe"
            fi
            if [ -n "$WIN_EXE" ]; then
              cp "$WIN_EXE" upload/${{ matrix.asset_name }}.exe
              cat > upload/诊断.bat << EOF
@echo off
chcp 65001 >nul
echo ========================================
echo 机器码获取工具 - 诊断脚本
echo ========================================
echo.
echo 日志: %APPDATA%\\machine-code-tool\\startup.log
echo.
if exist "%APPDATA%\\machine-code-tool\\startup.log" type "%APPDATA%\\machine-code-tool\\startup.log"
echo.
echo 正在启动程序...
start "" "%~dp0${{ matrix.asset_name }}.exe"
timeout /t 3 >nul
echo.
if exist "%APPDATA%\\machine-code-tool\\startup.log" (
  echo --- 启动后日志 ---
  type "%APPDATA%\\machine-code-tool\\startup.log"
) else (
  echo 未生成日志。常见原因: 未安装 WebView2 或 VC++ 运行库。
)
echo.
pause
EOF
              echo "✅ Windows 文件已准备完成 (from $WIN_EXE)"
            else
              echo "❌ 未找到 $WIN_BIN 或 machine-code-tool.exe"
              echo "已检查: src-tauri/target/${{ matrix.target }}/release/ 与 src-tauri/target/release/"
              find src-tauri/target -name "*.exe" -type f 2>/dev/null || true
              exit 1
            fi
          else
            echo "❌ 未知平台: ${{ matrix.os }}"
            exit 1
          fi
          ls -la upload/
        shell: bash

      - name: 生成平台说明文件
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            if [ "${{ matrix.asset_name }}" = "machine-code-tool-windows-32" ]; then
              echo "🚀 机器码获取工具 - Windows版(32位)" > upload/使用说明.txt
            else
              echo "🚀 机器码获取工具 - Windows版(64位)" > upload/使用说明.txt
            fi
            echo "=========================" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "💻 使用步骤：" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "1、 解压下载的压缩包" >> upload/使用说明.txt
            echo "   右键点击下载的 zip 文件 → 选择「解压到当前文件夹」或「全部解压」。" >> upload/使用说明.txt
            echo "   解压后会看到「${{ matrix.asset_name }}.exe」和本说明文件。" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "2、 运行程序" >> upload/使用说明.txt
            echo "   双击「${{ matrix.asset_name }}.exe」即可打开工具。" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "3、 若出现「无法验证发布者」或「Windows 已保护您的电脑」" >> upload/使用说明.txt
            echo "   属于正常提示。请点击「更多信息」→ 再点击「仍要运行」即可正常使用。" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "4、 若双击 exe 后窗口一闪就消失（闪退）" >> upload/使用说明.txt
            echo "   最常见原因：未安装 WebView2 运行时。" >> upload/使用说明.txt
            echo "   请安装 Evergreen 引导程序: https://go.microsoft.com/fwlink/p/?LinkId=2124703" >> upload/使用说明.txt
            echo "   安装后重新运行；若仍失败，双击同目录「诊断.bat」或查看日志:" >> upload/使用说明.txt
            echo "   %APPDATA%\\machine-code-tool\\startup.log" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "5、 若提示找不到 VCRUNTIME140_1.dll 或 VCRUNTIME140.dll" >> upload/使用说明.txt
            echo "   先双击同目录下的 vc_redist.x64.exe（32位包内为 vc_redist.x86.exe）安装运行库，再运行本程序。" >> upload/使用说明.txt
            echo "   安装时若提示已安装，可选择「修复」或「重新安装」。" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "6、 Windows 7 用户额外说明" >> upload/使用说明.txt
            echo "   需已安装 WebView2 运行时（Evergreen 引导程序）。" >> upload/使用说明.txt
            echo "   若报「无法定位程序输入点 ProcessPrng」，说明安装包并非用 Rust 1.77.2 构建，请重新下载最新 CI 产物。" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "✨ 功能：获取机器硬件信息，提供投标API服务" >> upload/使用说明.txt
            echo "📝 版本：2.1.0" >> upload/使用说明.txt
          
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            echo "🍎 机器码获取工具 - macOS版（通用版本）" > upload/使用说明.txt
            echo "=================================" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "🎉 此版本同时支持 Intel 和 Apple Silicon 芯片！" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "💻 使用步骤：" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "1、 运行程序" >> upload/使用说明.txt
            echo "   双击「${{ matrix.asset_name }}」即可打开工具。" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "2、 若提示「无法打开，因为来自身份不明的开发者」，任选一种方式即可：" >> upload/使用说明.txt
            echo "   方式一：右键点击该文件 → 选择「打开」→ 在弹窗中再次点击「打开」。之后可直接双击运行。" >> upload/使用说明.txt
            echo "   方式二：打开「系统设置」→ 左侧点「隐私与安全」→ 在右侧「安全性」区域找到被阻止的本程序 → 点击「仍要打开」→ 在确认弹窗中再点「打开」。" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "✨ 功能：获取机器硬件信息，提供投标API服务" >> upload/使用说明.txt
            echo "📝 版本：2.1.0（通用版本）" >> upload/使用说明.txt
          fi
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: upload/
          retention-days: 30
